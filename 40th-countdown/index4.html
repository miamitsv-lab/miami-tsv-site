<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miami 40th Anniversary Countdown</title>

  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #071510;
      font-family: Arial, Helvetica, sans-serif;
    }

    .banner {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      overflow: hidden;
      background-color: #071510;
      background-image: url("miami-banner-desktop.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .countdown-box {
      position: absolute;
      left: 50%;
      bottom: 5%;
      transform: translateX(-50%);
      width: min(84vw, 1280px);
      background: rgba(0, 45, 32, 0.92);
      border: 3px solid #c89b2c;
      border-radius: 22px;
      padding: 18px 22px 16px;
      color: white;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.40);
      backdrop-filter: blur(2px);
    }

    .countdown-title {
      font-size: clamp(18px, 2vw, 32px);
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 14px;
      letter-spacing: 1px;
      color: #f0c861;
    }

    .countdown-timer {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr 1fr 1fr;
      align-items: center;
    }

    .time-card {
      padding: 8px 12px;
      border-right: 2px solid rgba(214, 165, 52, 0.75);
    }

    .time-card:last-child { border-right: none; }

    .time-card span {
      display: block;
      font-size: clamp(40px, 4.7vw, 78px);
      font-weight: 800;
      color: #d6a534;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 4px rgba(0,0,0,0.45);
    }

    .time-card label {
      display: block;
      margin-top: 8px;
      font-size: clamp(12px, 1.15vw, 21px);
      font-weight: bold;
      text-transform: uppercase;
      color: #ffffff;
      letter-spacing: 0.04em;
    }

    /* Fallback CSS switching by screen shape */
    @media (max-aspect-ratio: 4/3) {
      .banner {
        background-image: url("miami-banner-tablet.png");
      }

      .countdown-box {
        width: min(88vw, 950px);
        bottom: 4.5%;
        padding: 15px 18px 13px;
        border-radius: 20px;
      }

      .countdown-title { font-size: clamp(16px, 2.5vw, 26px); }
      .time-card span { font-size: clamp(30px, 4.9vw, 58px); }
      .time-card label { font-size: clamp(11px, 1.55vw, 18px); }
    }

    @media (max-width: 640px), (max-aspect-ratio: 2/3) {
      .banner {
        background-image: url("miami-banner-mobile.png");
        background-position: center center;
      }

      .countdown-box {
        width: 88vw;
        bottom: 3%;
        padding: 12px 12px 10px;
        border-width: 2px;
        border-radius: 16px;
      }

      .countdown-title {
        font-size: clamp(14px, 4vw, 20px);
        margin-bottom: 9px;
      }

      .countdown-timer {
        grid-template-columns: 1fr 1fr;
        row-gap: 8px;
      }

      .time-card {
        border-right: none;
        padding: 8px 6px;
      }

      .time-card:nth-child(odd) {
        border-right: 1px solid rgba(214, 165, 52, 0.75);
      }

      .time-card:nth-child(-n+4) {
        border-bottom: 1px solid rgba(214, 165, 52, 0.75);
      }

      .time-card:nth-child(5) {
        grid-column: 1 / -1;
        border-right: none;
      }

      .time-card span { font-size: clamp(30px, 8.8vw, 52px); }
      .time-card label {
        font-size: clamp(11px, 3.3vw, 17px);
        margin-top: 5px;
      }
    }
  </style>
</head>

<body>
  <div class="banner" id="banner">
    <div class="countdown-box">
      <div class="countdown-title">Countdown to March 12, 2027</div>

      <div class="countdown-timer">
        <div class="time-card">
          <span id="days">000</span>
          <label>Days</label>
        </div>

        <div class="time-card">
          <span id="hours">00</span>
          <label>Hours</label>
        </div>

        <div class="time-card">
          <span id="minutes">00</span>
          <label>Minutes</label>
        </div>

        <div class="time-card">
          <span id="seconds">00</span>
          <label>Seconds</label>
        </div>

        <div class="time-card">
          <span id="milliseconds">000</span>
          <label>Milliseconds</label>
        </div>
      </div>
    </div>
  </div>

  <script>
    // More reliable image switching than width-only media queries.
    // This checks the screen shape, so phones in portrait get the mobile image.
    function setResponsiveBackground() {
      const banner = document.getElementById("banner");
      const width = window.innerWidth;
      const height = window.innerHeight;
      const ratio = width / height;

      let image = "miami-banner-desktop.png";

      if (width <= 640 || ratio <= 0.67) {
        image = "miami-banner-mobile.png";
      } else if (width <= 1199 || ratio <= 1.34) {
        image = "miami-banner-tablet.png";
      }

      banner.style.backgroundImage = `url("${image}")`;
    }

    window.addEventListener("load", setResponsiveBackground);
    window.addEventListener("resize", setResponsiveBackground);
    window.addEventListener("orientationchange", function () {
      setTimeout(setResponsiveBackground, 250);
    });

    const targetDate = new Date("March 12, 2027 00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("days").innerText = "000";
        document.getElementById("hours").innerText = "00";
        document.getElementById("minutes").innerText = "00";
        document.getElementById("seconds").innerText = "00";
        document.getElementById("milliseconds").innerText = "000";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);
      const milliseconds = distance % 1000;

      document.getElementById("days").innerText = String(days).padStart(3, "0");
      document.getElementById("hours").innerText = String(hours).padStart(2, "0");
      document.getElementById("minutes").innerText = String(minutes).padStart(2, "0");
      document.getElementById("seconds").innerText = String(seconds).padStart(2, "0");
      document.getElementById("milliseconds").innerText = String(milliseconds).padStart(3, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 50);
  </script>
</body>
</html>
